# ─────────────────────────────────────────────────────────────────────────────
# SERVIDOR
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────────────────────────────────────
# BASE DE DATOS — PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/prode_mundial_2026
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────────────────────────────────────
# JPA / HIBERNATE
# FIX #19: En producción cambiar a "validate" y usar Flyway para migraciones.
# "update" es aceptable solo en desarrollo. Nunca usar "create" en producción.
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────────────────────────────────────
# DATOS INICIALES
# FIX #19: schema.sql se ejecuta en cada arranque.
# Con "always" y sentencias idempotentes (IF NOT EXISTS) es aceptable,
# pero la alternativa robusta es Flyway (agregar spring-boot-starter-flyway
# y mover los scripts a src/main/resources/db/migration/V1__*.sql).
# ─────────────────────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─────────────────────────────────────────────────────────────────────────────
# JWT
# FIX #8: El secret se valida al arrancar (mínimo 32 bytes en Base64).
# Generar con: openssl rand -base64 64
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────────────
# CORS
# ─────────────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:4200,https://prode-mundial-2026-62343.web.app

# ─────────────────────────────────────────────────────────────────────────────
# SEGURIDAD — Cookie
# FIX #7: Hardcoded "false" reemplazado por property configurable por entorno.
# En producción (HTTPS) setear a true en el .env de producción o variable de entorno.
# ─────────────────────────────────────────────────────────────────────────────
app.cookie.secure=false

# ─────────────────────────────────────────────────────────────────────────────
# SEGURIDAD — Rate Limiter
# FIX #10: IPs de proxies/load-balancers confiables separadas por coma.
# Solo si la petición viene de una de estas IPs se respeta X-Forwarded-For.
# Dejar vacío si no hay proxy delante (desarrollo local).
# Ejemplo producción: app.trusted-proxies=10.0.1.1,10.0.1.2
# ─────────────────────────────────────────────────────────────────────────────
app.trusted-proxies=

# ─────────────────────────────────────────────────────────────────────────────
# ERRORES
# FIX #11: En producción setear a false para no exponer internals al cliente.
# ─────────────────────────────────────────────────────────────────────────────
app.show-error-details=false

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULING (necesario para @Scheduled en LoginRateLimitFilter)
# FIX #6: Habilitar el scheduler de Spring para la limpieza automática del mapa
# de rate limiting. Sin esto @Scheduled no se ejecuta.
# ─────────────────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

# ─────────────────────────────────────────────────────────────────────────────
# EMAIL — Resend API (HTTP)
# ─────────────────────────────────────────────────────────────────────────────
# Remitente que verá el participante. 
# Si no tenés dominio verificado en Resend, debés usar: onboarding@resend.dev
app.email.from=info@prode-mundial-2026-62343.web.app
app.email.from-name=Prode Mundial 2026
resend.api.key=${RESEND_API_KEY}
