# ─────────────────────────────────────────────────────────────────────────────
# SERVIDOR
# Puerto donde corre el backend (Angular corre en 4200, el backend en 8080)
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────────────────────────────────────
# BASE DE DATOS — PostgreSQL
# Cambiá "localhost:5432/prode_mundial_2026" si tu DB está en otro servidor
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/prode_mundial_2026
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────────────────────────────────────
# JPA / HIBERNATE
# ─────────────────────────────────────────────────────────────────────────────

# "update"   → Hibernate actualiza las tablas si cambiaste algo en el modelo
# "create"   → Borra y recrea todas las tablas al iniciar (solo para desarrollo)
# "validate" → Solo verifica, no toca la DB (recomendado en producción)
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (útil para depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────────────────────────────────────
# DATOS INICIALES
# Carga data.sql con los 104 partidos al iniciar la app (solo si las tablas
# están vacías, gracias a la condición que ponemos en el servicio)
# ─────────────────────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─────────────────────────────────────────────────────────────────────────────
# JWT — JSON Web Token
# Cambiá "jwt.secret" por una cadena larga y aleatoria en producción
# Podés generar una en: https://www.uuidgenerator.net/
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────────────
# CORS — permite que Angular (puerto 4200) llame al backend (puerto 8080)
# ─────────────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:4200

app.show-error-details=false
