<div class="chatbot-container">
  <!-- Floating Button -->
  <button
    class="chatbot-fab"
    (click)="toggleChat()"
    [attr.aria-label]="isOpen() ? 'Cerrar Chat' : 'Abrir Chat'"
  >
    <i class="fas" [class.fa-comments]="!isOpen()" [class.fa-times]="isOpen()"></i>
  </button>

  <!-- Chat Window -->
  @if (isOpen()) {
    <div class="chatbot-window">
      <div class="chatbot-header">
        <div class="header-info">
          <i class="fas fa-robot"></i>
          <h3>Asistente Prode 2026</h3>
        </div>
        <button class="close-btn" (click)="toggleChat()">&times;</button>
      </div>

      <div class="chatbot-messages" #scrollMe>
        @for (msg of messages(); track msg.text + $index) {
          <div class="message" [class.user]="msg.type === 'user'" [class.bot]="msg.type === 'bot'">
            <div class="message-bubble">{{ msg.text }}</div>
          </div>
        }

        <!-- Contact Admin Quick Action — solo cuando hay pocos mensajes -->
        @if (messages().length < 5) {
          <div class="contact-admin-card">
            <p>¿Problemas técnicos o dudas con tu pago?</p>
            <a
              href="mailto:proyectos.lucho.tati@gmail.com?subject=Consulta Prode 2026"
              class="contact-btn"
            >
              <i class="fas fa-envelope"></i>
              Contactar Administrador
            </a>
          </div>
        }

        <!-- Loading indicator -->
        @if (isLoading()) {
          <div class="message bot">
            <div class="message-bubble loading">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        }
      </div>

      <div class="chatbot-input">
        <input
          type="text"
          id="chatInput"
          name="chatInput"
          [(ngModel)]="userMessage"
          (keyup.enter)="sendMessage()"
          placeholder="Escribe tu duda aquí..."
          [disabled]="isLoading()"
        />
        <button (click)="sendMessage()" [disabled]="isLoading() || !userMessage.trim()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  }
</div>
